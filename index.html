<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Controle de Motoristas v5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <style>
        body { background-color: #f4f7f6; padding: 20px; font-family: sans-serif; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .col-input { background-color: #fff9c4 !important; min-width: 200px; }
        .input-text { border: 2px solid #ffc107; border-radius: 4px; padding: 5px; width: 100%; font-weight: bold; }
        .saved-row { opacity: 0.3; pointer-events: none; background-color: #d4edda !important; }
        #info { font-weight: bold; color: #007bff; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-4">
        <h2>Motoristas Pendentes</h2>
        <div id="info">Iniciando leitura do sistema...</div>
    </div>

    <div id="tabela-container" style="display: none;">
        <table id="minhaTabela" class="table table-sm table-hover table-bordered w-100">
            <thead class="table-dark"><tr id="theader"></tr></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
$(document).ready(function() {
    const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4075sYsvoz_4YZmDnxQRUoVWE86-yamQ4UkCtyYz3ZEJM3qoTdmr1q4IW4ARKCw8rJ1HQMAvNyinA/pub?gid=0&single=true&output=csv' + new Date().getTime();
    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbw7ufySzeBvbCbn0FVEmeahO57iJRYRcYHu0m3fCfcAjDFgbmVd4L1W4vLOdhEXdSWuOA/exec'; 

    Papa.parse(URL_CSV, {
        download: true,
        header: true,
        skipEmptyLines: true,
        dynamicTyping: false, // Mantém tudo como texto para evitar erro em números com vírgula
        complete: function(res) {
            let dados = res.data;
            let colunasBrutas = res.meta.fields;

            // Limpeza de nomes de colunas (remove espaços extras que o Google Sheets coloca)
            let colunas = colunasBrutas.map(c => c.trim());
            
            // Mapear os nomes das colunas de interesse
            const COL_BUSCA = colunas.find(c => c === "Motorista");
            const COL_ID = colunas.find(c => c.includes("Motorista Identificado"));

            if (!COL_BUSCA || !COL_ID) {
                $('#info').html("<span class='text-danger'>Erro: Colunas não encontradas. Verifique os títulos na planilha.</span>");
                return;
            }

            // Gerar Cabeçalho
            let hHtml = "";
            colunas.forEach(c => hHtml += `<th>${c}</th>`);
            hHtml += "<th>Ação</th>";
            $('#theader').html(hHtml);

            let contagem = 0;
            dados.forEach(row => {
                // Como limpamos as colunas, precisamos acessar os dados pela chave original
                const valMotorista = (row[colunasBrutas[colunas.indexOf(COL_BUSCA)]] || "").toString();
                const valIdentificado = (row[colunasBrutas[colunas.indexOf(COL_ID)]] || "").toString().trim();

                const ehDesconhecido = /Unmatched|Unknown/i.test(valMotorista);
                const estaVazio = (valIdentificado === "");

                if (ehDesconhecido && estaVazio) {
                    contagem++;
                    let rHtml = "<tr>";
                    colunasBrutas.forEach(c => {
                        if (c.trim() === COL_ID) {
                            rHtml += `<td class="col-input"><input type="text" class="input-text" placeholder="Identificar..."></td>`;
                        } else {
                            rHtml += `<td>${row[c] || ""}</td>`;
                        }
                    });
                    rHtml += `<td><button class="btn btn-sm btn-success btn-salvar">Salvar</button></td>`;
                    rHtml += "</tr>";
                    $('#tbody').append(rHtml);
                }
            });

            $('#info').text("Registros pendentes: " + contagem);
            $('#tabela-container').show();
            $('#minhaTabela').DataTable({ language: { url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/pt-BR.json' }});
        }
    });

    $('#tbody').on('click', '.btn-salvar', function() {
        const btn = $(this);
        const row = btn.closest('tr');
        const input = row.find('.input-text');
        const novoNome = input.val().trim();

        if (!novoNome) return alert("Por favor, digite o nome!");

        btn.prop('disabled', true).text('⏳');

        let payload = {};
        const ths = [];
        $('#theader th').each(function() { ths.push($(this).text().trim()); });

        row.find('td').each(function(i) {
            const cabecalho = ths[i];
            if (cabecalho === "Ação") return;
            
            if (cabecalho.includes("Motorista Identificado")) {
                payload[cabecalho] = novoNome;
            } else {
                payload[cabecalho] = $(this).text().trim();
            }
        });

        fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => {
            btn.text('✅').removeClass('btn-success').addClass('btn-secondary');
            row.addClass('saved-row');
            input.prop('disabled', true);
        })
        .catch(() => {
            alert("Erro ao salvar!");
            btn.prop('disabled', false).text('Salvar');
        });
    });
});
</script>
</body>
</html>
