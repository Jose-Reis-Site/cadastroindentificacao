<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Média por Motorista</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-section { margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        #loading { margin: 20px 0; font-weight: bold; color: #007bff; }
        table thead { background-color: #007bff; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section text-center">
        <h2>Visualizador em Tempo Real</h2>
        <p class="text-muted">Dados carregados diretamente do Google Sheets</p>
        <div id="loading">Carregando dados...</div>
    </div>

    <div id="tabela-container" style="display: none;">
        <table id="dadosTabela" class="table table-striped table-hover table-bordered w-100">
            <thead>
                <tr id="tableHeader"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
    $(document).ready(function() {
        // Sua URL de publicação
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4075sYsvoz_4YZmDnxQRUoVWE86-yamQ4UkCtyYz3ZEJM3qoTdmr1q4IW4ARKCw8rJ1HQMAvNyinA/pub?gid=0&single=true&output=csv';

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            encoding: "UTF-8",
            complete: function(results) {
                const data = results.data;
                const columns = results.meta.fields;

                // Criar Cabeçalho dinamicamente
                columns.forEach(col => {
                    $('#tableHeader').append(`<th>${col}</th>`);
                });

                // Preencher Linhas
                data.forEach(row => {
                    let htmlRow = '<tr>';
                    columns.forEach(col => {
                        htmlRow += `<td>${row[col] || ''}</td>`;
                    });
                    htmlRow += '</tr>';
                    $('#tableBody').append(htmlRow);
                });

                // Esconder aviso de carregamento e mostrar tabela
                $('#loading').hide();
                $('#tabela-container').show();

                // Inicializar DataTables
                $('#dadosTabela').DataTable({
                    language: {
                        url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/pt-BR.json'
                    },
                    responsive: true,
                    pageLength: 15,
                    order: [] 
                });
            },
            error: function(err) {
                $('#loading').html('<span class="text-danger">Erro ao carregar os dados. Verifique a publicação da planilha.</span>');
                console.error(err);
            }
        });
    });
</script>

</body>
</html>
