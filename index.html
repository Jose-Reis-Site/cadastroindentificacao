<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificação de Motoristas - Pendentes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <style>
        body { background-color: #f4f7f6; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .col-identificada { background-color: #fff9c4 !important; min-width: 200px; }
        .input-motorista { border: 1px solid #ffa000; border-radius: 4px; padding: 5px; width: 100%; }
        table thead { background-color: #343a40; color: white; }
        .saved-row { opacity: 0.5; background-color: #d4edda !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section text-center mb-4">
        <h2>Motoristas Aguardando Identificação</h2>
        <p id="status-text" class="text-muted">Filtrando apenas registros desconhecidos e não identificados...</p>
    </div>

    <div id="tabela-container" style="display: none;">
        <table id="dadosTabela" class="table table-sm table-hover table-bordered w-100">
            <thead><tr id="tableHeader"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
$(document).ready(function() {
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4075sYsvoz_4YZmDnxQRUoVWE86-yamQ4UkCtyYz3ZEJM3qoTdmr1q4IW4ARKCw8rJ1HQMAvNyinA/pub?gid=0&single=true&output=csv';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzswLkRcC69l9IIrd2W3fsnS-0UrvBshc0SIeJFmBHxOwTiJ6esa2QIvLVggNPBjJ-dAA/exec'; 

    let table;

    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            let data = results.data;
            let columns = results.meta.fields;

            // Criar cabeçalho dinâmico (mantendo a ordem original do CSV)
            const colAcao = "Ação de Salvar";
            let headerHtml = "";
            columns.forEach(col => { headerHtml += `<th>${col}</th>`; });
            headerHtml += `<th>${colAcao}</th>`;
            $('#tableHeader').html(headerHtml);

            data.forEach((row, idx) => {
                let htmlRow = `<tr>`;
                columns.forEach(col => {
                    // Se for a coluna "Motorista identificado", transformamos em um input
                    if (col === "Motorista identificado") {
                        htmlRow += `<td class="col-identificada">
                            <input type="text" class="input-motorista" value="${row[col] || ''}" placeholder="Nome do motorista...">
                        </td>`;
                    } else {
                        htmlRow += `<td>${row[col] || ''}</td>`;
                    }
                });
                // Botão no final
                htmlRow += `<td><button class="btn btn-primary btn-sm btn-save">Salvar</button></td>`;
                htmlRow += `</tr>`;
                $('#tableBody').append(htmlRow);
            });

            $('#tabela-container').show();

            // Custom Filter para o DataTables
            $.fn.dataTable.ext.search.push(
                function(settings, data, dataIndex) {
                    let idxMotorista = -1;
                    let idxIdentificado = -1;

                    // Achar os índices das colunas pelo nome
                    $('#tableHeader th').each(function(i) {
                        let txt = $(this).text().trim();
                        if (txt === "Motorista") idxMotorista = i;
                        if (txt === "Motorista identificado") idxIdentificado = i;
                    });

                    let valorMotorista = data[idxMotorista] || "";
                    // Para o DataTables, o valor do input precisa ser pego via DOM se for editável, 
                    // mas como estamos filtrando o carregamento inicial do CSV:
                    let valorIdentificado = data[idxIdentificado] || "";

                    // REGRA: Mostrar se (Motorista contém Unmatched OU Unknown) E (Motorista identificado está vazio)
                    let ehDesconhecido = /Unmatched|Unknown/i.test(valorMotorista);
                    let naoEstaPreenchido = (valorIdentificado.trim() === "");

                    return ehDesconhecido && naoEstaPreenchido;
                }
            );

            table = $('#dadosTabela').DataTable({
                language: { url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/pt-BR.json' },
                pageLength: 25
            });

            $('#status-text').text("Registros pendentes filtrados com sucesso.");
        }
    });

    // Função de Salvar (Individual)
    $('#tableBody').on('click', '.btn-save', function() {
        const rowBtn = $(this);
        const rowElement = rowBtn.closest('tr');
        const inputIdentificado = rowElement.find('.input-motorista');
        const novoNome = inputIdentificado.val();

        if (!novoNome) {
            alert("Digite um nome para identificar o motorista!");
            return;
        }

        rowBtn.prop('disabled', true).text('⏳');

        let dadosLinha = {};
        const cabecalhos = [];
        $('#tableHeader th').each(function() { cabecalhos.push($(this).text()); });

        rowElement.find('td').each(function(i) {
            let titulo = cabecalhos[i];
            if (titulo === "Motorista identificado") {
                dadosLinha[titulo] = novoNome;
            } else if (titulo !== "Ação de Salvar") {
                dadosLinha[titulo] = $(this).text();
            }
        });

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(dadosLinha)
        })
        .then(() => {
            rowBtn.text('✅').removeClass('btn-primary').addClass('btn-success');
            rowElement.addClass('saved-row');
            inputIdentificado.prop('disabled', true);
            // Opcional: remover a linha da visão após salvar
            // setTimeout(() => { table.row(rowElement).remove().draw(); }, 1500);
        })
        .catch(() => {
            alert("Erro ao salvar");
            rowBtn.prop('disabled', false).text('Salvar');
        });
    });
});
</script>
</body>
</html>
