<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificação de Motoristas - Pendentes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <style>
        body { background-color: #f4f7f6; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .col-identificada { background-color: #fff9c4 !important; min-width: 220px; }
        .input-motorista { border: 2px solid #ffa000; border-radius: 4px; padding: 5px; width: 100%; font-weight: bold; }
        table thead { background-color: #343a40; color: white; }
        .saved-row { opacity: 0.4; pointer-events: none; background-color: #d4edda !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section text-center mb-4">
        <h2>Motoristas Pendentes</h2>
        <p id="status-text" class="text-muted">Filtrando: Desconhecidos e Sem Nome Identificado</p>
    </div>

    <div id="tabela-container" style="display: none;">
        <table id="dadosTabela" class="table table-sm table-hover table-bordered w-100">
            <thead><tr id="tableHeader"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
$(document).ready(function() {
    // Certifique-se de que a URL de publicação está correta
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4075sYsvoz_4YZmDnxQRUoVWE86-yamQ4UkCtyYz3ZEJM3qoTdmr1q4IW4ARKCw8rJ1HQMAvNyinA/pub?gid=0&single=true&output=csv';
    const SCRIPT_URL = 'SUA_URL_DO_APPS_SCRIPT_AQUI'; 

    let table;

    // 1. LIMPAR FILTROS ANTERIORES DO DATATABLES (Prevenção de erros)
    $.fn.dataTable.ext.search = [];

    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            let data = results.data;
            let columns = results.meta.fields;

            // Nome exato da sua coluna L na planilha:
            const NOME_COLUNA_L = "Motorista identificado"; 

            // Criar Cabeçalho
            let headerHtml = "";
            columns.forEach(col => { headerHtml += `<th>${col}</th>`; });
            headerHtml += `<th>Ação</th>`;
            $('#tableHeader').html(headerHtml);

            // Filtrar os dados ANTES de colocar na tabela para garantir que linhas já identificadas não apareçam
            let dadosFiltrados = data.filter(row => {
                let motorista = (row["Motorista"] || "").toString();
                let identificado = (row[NOME_COLUNA_L] || "").toString().trim();
                
                // Condição: Deve ser Unknown/Unmatched E a coluna L deve estar VAZIA
                let ehDesconhecido = /Unmatched|Unknown/i.test(motorista);
                let estaVazio = (identificado === "");
                
                return ehDesconhecido && estaVazio;
            });

            // Gerar Linhas apenas com os dados filtrados
            dadosFiltrados.forEach((row, idx) => {
                let htmlRow = `<tr>`;
                columns.forEach(col => {
                    if (col === NOME_COLUNA_L) {
                        htmlRow += `<td class="col-identificada">
                            <input type="text" class="input-motorista" placeholder="Escreva o nome e salve...">
                        </td>`;
                    } else {
                        htmlRow += `<td>${row[col] || ''}</td>`;
                    }
                });
                htmlRow += `<td><button class="btn btn-primary btn-sm btn-save">Salvar</button></td>`;
                htmlRow += `</tr>`;
                $('#tableBody').append(htmlRow);
            });

            $('#tabela-container').show();

            // Inicializar DataTable
            table = $('#dadosTabela').DataTable({
                language: { url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/pt-BR.json' },
                pageLength: 50,
                order: []
            });

            $('#status-text').text(`Encontrados ${dadosFiltrados.length} registros pendentes.`);
        }
    });

    // Função de Salvar Corrigida
    $('#tableBody').on('click', '.btn-save', function() {
        const rowBtn = $(this);
        const rowElement = rowBtn.closest('tr');
        const inputField = rowElement.find('.input-motorista');
        const novoNome = inputField.val().trim();

        if (!novoNome) {
            alert("Por favor, digite o nome do motorista antes de salvar!");
            return;
        }

        rowBtn.prop('disabled', true).text('⏳');

        // Pegar todos os nomes de colunas do cabeçalho (exceto "Ação")
        let cabecalhos = [];
        $('#tableHeader th').each(function() { 
            let txt = $(this).text();
            if (txt !== "Ação") cabecalhos.push(txt);
        });

        // Montar o objeto de dados a partir das células da linha
        let dadosParaEnviar = {};
        rowElement.find('td').each(function(index) {
            let titulo = cabecalhos[index];
            if (!titulo) return; // Pula a coluna de ação

            if (titulo === "Motorista identificado") {
                dadosParaEnviar[titulo] = novoNome;
            } else {
                dadosParaEnviar[titulo] = $(this).text().trim();
            }
        });

        // Enviar para o Google Sheets
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(dadosParaEnviar)
        })
        .then(() => {
            rowBtn.text('✅').removeClass('btn-primary').addClass('btn-success');
            rowElement.addClass('saved-row');
            inputField.prop('disabled', true);
            alert("Sucesso! Motorista identificado: " + novoNome);
        })
        .catch(err => {
            console.error(err);
            alert("Erro na conexão.");
            rowBtn.prop('disabled', false).text('Salvar');
        });
    });
});
</script>
</body>
</html>
