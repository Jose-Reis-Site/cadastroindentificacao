<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Telemetria - Edição Manual</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    
    <style>
        body { background-color: #f4f7f6; padding: 20px; font-family: sans-serif; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header-section { margin-bottom: 25px; border-bottom: 2px solid #f1f1f1; padding-bottom: 20px; }
        #loading { margin: 20px 0; font-weight: bold; color: #007bff; }
        .col-identificada { background-color: #e8f5e9 !important; min-width: 200px; }
        .input-motorista { border: 2px solid #198754; border-radius: 4px; padding: 4px; width: 100%; font-weight: bold; }
        table thead { background-color: #007bff; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section text-center">
        <h2>Tratamento de Motoristas</h2>
        <p class="text-muted">Preencha os nomes em destaque antes de sincronizar</p>
        
        <div id="loading">Buscando dados...</div>

        <button id="btnEnviar" class="btn btn-success btn-lg" style="display:none;">
            🚀 Sincronizar Tudo com Google Sheets
        </button>
    </div>

    <div id="tabela-container" style="display: none;">
        <table id="dadosTabela" class="table table-striped table-hover table-bordered w-100">
            <thead>
                <tr id="tableHeader"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
    $(document).ready(function() {
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4075sYsvoz_4YZmDnxQRUoVWE86-yamQ4UkCtyYz3ZEJM3qoTdmr1q4IW4ARKCw8rJ1HQMAvNyinA/pub?gid=0&single=true&output=csv';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxKOphOJ4y0lM5IvyyJskFpDIfR3KkqZjQbaZb5uHLfEOY_CSn6iKTMVkYYr1AwmCcqeQ/exec'; // <-- NÃO ESQUEÇA DE COLAR AQUI

        const mapeamentoMotoristas = {
            "Unmatched Extended DriverID": "", // Deixamos vazio para forçar o preenchimento
            "Unknown": "",
            "NULL": ""
        };

        let tabelaDataTable;

        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                let data = results.data;
                let columns = results.meta.fields;
                const novaCol = "Motorista Identificado";
                columns.unshift(novaCol);

                columns.forEach(col => $('#tableHeader').append(`<th>${col}</th>`));

                data.forEach((row, index) => {
                    const original = row['Motorista'] || '';
                    // Se estiver no mapeamento, vira um campo editável, senão mantém o nome
                    const valorMapeado = mapeamentoMotoristas[original] !== undefined ? mapeamentoMotoristas[original] : original;
                    
                    let htmlRow = '<tr>';
                    columns.forEach(col => {
                        if (col === novaCol) {
                            // Criamos um INPUT para a nova coluna
                            htmlRow += `<td class="col-identificada">
                                <input type="text" class="input-motorista" 
                                       placeholder="Digite o nome..." 
                                       value="${valorMapeado}" 
                                       data-row-index="${index}">
                            </td>`;
                        } else {
                            htmlRow += `<td>${row[col] || ''}</td>`;
                        }
                    });
                    htmlRow += '</tr>';
                    $('#tableBody').append(htmlRow);
                });

                $('#loading').hide();
                $('#tabela-container').show();
                $('#btnEnviar').fadeIn();

                tabelaDataTable = $('#dadosTabela').DataTable({
                    language: { url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/pt-BR.json' },
                    pageLength: 25
                });
            }
        });

        $('#btnEnviar').on('click', function() {
            // Pegamos todos os dados da tabela original do DataTables
            // Mas atualizamos o campo "Motorista Identificado" com o que foi digitado nos inputs
            let dadosFinais = [];
            
            // Itera sobre todas as linhas (mesmo as que não aparecem na página atual do DataTable)
            const todasAsLinhas = tabelaDataTable.rows().data().toArray();
            const inputs = $('.input-motorista');

            // Importante: Garantir que pegamos os valores atuais dos inputs
            $('#dadosTabela tbody tr').each(function(i) {
                let rowData = tabelaDataTable.row(this).data();
                if(rowData) {
                    let inputVal = $(this).find('.input-motorista').val();
                    // Criamos um objeto limpo para enviar
                    let itemEnvio = {};
                    // Mapeamos as colunas corretamente
                    $('#tableHeader th').each(function(indexCol){
                        let nomeCol = $(this).text();
                        if(nomeCol === "Motorista Identificado") {
                            itemEnvio[nomeCol] = inputVal;
                        } else {
                            // Pegamos o valor da coluna correspondente (ajustado pelo offset da nova coluna)
                            itemEnvio[nomeCol] = rowData[indexCol]; 
                        }
                    });
                    dadosFinais.push(itemEnvio);
                }
            });

            if (!confirm(`Deseja enviar ${dadosFinais.length} linhas para a planilha?`)) return;

            const btn = $(this);
            btn.prop('disabled', true).text('⏳ Enviando...');

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(dadosFinais)
            })
            .then(() => {
                alert('Dados enviados com sucesso!');
                btn.prop('disabled', false).text('🚀 Sincronizar Tudo com Google Sheets');
            })
            .catch(err => {
                console.error(err);
                alert('Erro ao enviar.');
                btn.prop('disabled', false).text('🚀 Sincronizar Tudo com Google Sheets');
            });
        });
    });
</script>

</body>
</html>
